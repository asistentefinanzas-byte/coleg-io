<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobranza — Coleg.IO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* Coleg.IO shell */
  --bg:#f9f7f4; --surface:#fff; --surface-2:#f4f1ec;
  --border:#e8e3db; --border-2:#d6cfc4;
  --ink-1:#1a1814; --ink-2:#5a5650; --ink-3:#9c9690; --ink-4:#c4bfb8;
  --sage:#c8d5c0; --sage-bg:#eef2eb;
  --sand:#e0d4b8; --sand-bg:#f7f2e8;
  --sky:#b8cfe0; --sky-bg:#eaf2f8;
  --lav:#d0c8e8; --lav-bg:#f2eff8;
  --rose:#e8c4c0; --rose-bg:#faeeed;
  --sidebar-w:220px; --topbar-h:56px; --r:10px;
  /* Cobranza statuses */
  --st-sin:#8C8A80;         --st-sin-bg:#EFEEE9;
  --st-seg:#B6791C;         --st-seg-bg:#FBF0DD;
  --st-comp:#2E6F95;        --st-comp-bg:#E5F0F6;
  --st-pag:#2F7D4F;         --st-pag-bg:#E5F3EA;
  --st-sus:#B23B3B;         --st-sus-bg:#FAE7E5;
  /* Kanban column bg */
  --col-bg:#EFEDE6;
}
html,body{height:100%;background:var(--bg);color:var(--ink-1);font-family:'Inter',sans-serif;font-size:13.5px;-webkit-font-smoothing:antialiased;overflow:hidden;}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}

/* ── APP SHELL ──────────────────────────────────────────── */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--topbar-h) 1fr;height:100vh;}

/* topbar */
.topbar{grid-column:1/-1;display:flex;align-items:center;gap:14px;padding:0 28px;background:var(--surface);border-bottom:1px solid var(--border);}
.logo{font-family:'Playfair Display',serif;font-size:17px;font-weight:500;text-decoration:none;color:var(--ink-1);flex-shrink:0;}
.logo em{font-style:normal;color:var(--ink-3);}
.logo-sep{width:1px;height:16px;background:var(--border-2);}
.logo-region{font-size:11px;color:var(--ink-3);}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-3);}
.breadcrumb a{color:var(--ink-3);text-decoration:none;transition:color .15s;}
.breadcrumb a:hover{color:var(--ink-1);}
.breadcrumb span{color:var(--ink-4);}
.topbar-search{margin-left:auto;display:flex;align-items:center;gap:7px;height:30px;padding:0 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:7px;width:220px;}
.topbar-search input{border:none;background:none;outline:none;font:inherit;font-size:12.5px;color:var(--ink-1);width:100%;}
.topbar-search input::placeholder{color:var(--ink-4);}
.conn-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-4);margin-left:10px;flex-shrink:0;}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--sand);}
.conn-dot.ok{background:var(--sage);} .conn-dot.err{background:var(--rose);}

/* sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 12px;overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:0;}
.nav-group{margin-bottom:20px;}
.nav-group-label{font-size:10px;font-weight:600;letter-spacing:1px;color:var(--ink-4);text-transform:uppercase;padding:0 10px;margin-bottom:4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;cursor:pointer;color:var(--ink-3);text-decoration:none;transition:background .15s,color .15s;position:relative;}
.nav-item:hover{background:var(--surface-2);color:var(--ink-2);}
.nav-item.active{background:var(--surface-2);color:var(--ink-1);}
.nav-item.active .nav-dot{opacity:1;}
.nav-dot{position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:16px;border-radius:2px;background:var(--ink-1);opacity:0;transition:opacity .15s;}
.nav-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid transparent;}
.nav-label{font-size:13px;font-weight:500;flex:1;}
/* view tabs inside sidebar */
.view-tabs{display:flex;flex-direction:column;gap:2px;margin:0 0 20px;}
.vtab{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;font:inherit;font-size:12.5px;font-weight:500;cursor:pointer;color:var(--ink-3);background:none;border:none;text-align:left;transition:background .15s,color .15s;}
.vtab:hover{background:var(--surface-2);color:var(--ink-2);}
.vtab.active{background:var(--surface-2);color:var(--ink-1);}
.vtab svg{flex-shrink:0;}
.sidebar-sep{height:1px;background:var(--border);margin:8px 4px 14px;}
.sidebar-footer{margin-top:auto;}
.user-row{display:flex;align-items:center;gap:9px;padding:8px 10px;}
.user-av{width:28px;height:28px;border-radius:7px;background:var(--lav);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#5a4e8a;flex-shrink:0;}
.user-name{font-size:12.5px;font-weight:500;} .user-role{font-size:11px;color:var(--ink-4);}

/* ── MAIN AREA ──────────────────────────────────────────── */
.main{overflow:hidden;display:flex;flex-direction:column;background:var(--bg);}

/* ── STATUS CHIPS ───────────────────────────────────────── */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;white-space:nowrap;border:1px solid transparent;}
.chip-dot{width:5px;height:5px;border-radius:50%;}
.chip.SIN_CONTACTAR  {color:var(--st-sin); background:var(--st-sin-bg);}
.chip.EN_SEGUIMIENTO {color:var(--st-seg); background:var(--st-seg-bg);}
.chip.COMPROMISO_DE_PAGO{color:var(--st-comp);background:var(--st-comp-bg);}
.chip.PAGADO         {color:var(--st-pag); background:var(--st-pag-bg);}
.chip.SUSPENDIDO     {color:var(--st-sus); background:var(--st-sus-bg);}
.chip-dot.SIN_CONTACTAR  {background:var(--st-sin);}
.chip-dot.EN_SEGUIMIENTO {background:var(--st-seg);}
.chip-dot.COMPROMISO_DE_PAGO{background:var(--st-comp);}
.chip-dot.PAGADO         {background:var(--st-pag);}
.chip-dot.SUSPENDIDO     {background:var(--st-sus);}

/* ── VIEW: KANBAN ────────────────────────────────────────── */
#view-kanban{flex:1;overflow-x:auto;overflow-y:hidden;padding:20px 24px;}
.board{display:flex;gap:12px;height:100%;align-items:flex-start;}
.col{background:var(--col-bg);border-radius:12px;padding:10px;width:240px;flex-shrink:0;max-height:100%;overflow-y:auto;display:flex;flex-direction:column;}
.col::-webkit-scrollbar{width:3px;} .col::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px;}
.col-head{display:flex;align-items:center;justify-content:space-between;padding:4px 4px 10px;}
.col-title{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink-2);}
.col-dot{width:7px;height:7px;border-radius:50%;}
.col-count{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-3);background:var(--surface);border-radius:99px;padding:1px 7px;}
.col.drag-over{background:#e6e3da;outline:2px dashed var(--border-2);outline-offset:-2px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 12px;margin-bottom:8px;cursor:grab;position:relative;border-left:3px solid var(--st-sin);transition:transform .1s,box-shadow .1s;}
.card:active{cursor:grabbing;}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.07);}
.card.SIN_CONTACTAR  {border-left-color:var(--st-sin);}
.card.EN_SEGUIMIENTO {border-left-color:var(--st-seg);}
.card.COMPROMISO_DE_PAGO{border-left-color:var(--st-comp);}
.card.PAGADO         {border-left-color:var(--st-pag);}
.card.SUSPENDIDO     {border-left-color:var(--st-sus);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
.card-name{font-weight:600;font-size:12.5px;line-height:1.3;color:var(--ink-1);}
.card-meta{font-size:11px;color:var(--ink-3);margin-top:1px;}
.card-days{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;flex-shrink:0;}
.card-days.ok{color:var(--st-pag);} .card-days.warn{color:var(--st-seg);} .card-days.bad{color:var(--st-sus);}
.card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:9px;padding-top:9px;border-top:1px dashed var(--border);font-size:11px;color:var(--ink-3);}
.card-amount{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;color:var(--ink-1);}
.card-pago-badge{font-size:9.5px;font-weight:600;padding:1px 7px;border-radius:99px;background:var(--sage-bg);color:var(--sage-d,#3d7a5a);border:1px solid var(--sage);}

/* ── VIEW: DASHBOARD ─────────────────────────────────────── */
#view-dashboard{flex:1;overflow-y:auto;padding:24px 28px;}
#view-dashboard::-webkit-scrollbar{width:3px;}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden;}
.kpi-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0;}
.kpi-label{font-size:10.5px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.2px;}
.kpi-val{font-family:'Playfair Display',serif;font-size:28px;color:var(--ink-1);margin-top:8px;line-height:1;}
.kpi-sub{font-size:11px;color:var(--ink-4);margin-top:4px;}
.dash-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:14px;}
.panel-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;}
.panel-box h3{font-family:'Playfair Display',serif;font-size:15px;font-weight:400;margin-bottom:14px;color:var(--ink-1);}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12px;}
.bar-lbl{width:140px;flex-shrink:0;display:flex;align-items:center;gap:6px;color:var(--ink-2);}
.bar-track{flex:1;background:var(--surface-2);border-radius:6px;height:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;transition:width .4s;}
.bar-n{width:22px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-3);}
.ranking{list-style:none;}
.ranking li{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px;}
.ranking li:last-child{border-bottom:none;}
.ranking .rname{font-weight:500;color:var(--ink-1);}
.ranking .rdays{font-family:'IBM Plex Mono',monospace;color:var(--st-sus);font-weight:600;}

/* ── VIEW: TABLA ─────────────────────────────────────────── */
#view-tabla{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:20px 28px 0;}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.fbtn{font-size:11.5px;padding:5px 13px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--ink-3);cursor:pointer;font-family:inherit;transition:all .15s;}
.fbtn:hover{border-color:var(--border-2);color:var(--ink-2);}
.fbtn.active{background:var(--ink-1);color:#fff;border-color:var(--ink-1);}
.tbl-outer{flex:1;overflow-y:auto;}
.tbl-outer::-webkit-scrollbar{width:3px;} .tbl-outer::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px;}
table{width:100%;border-collapse:collapse;}
th{font-size:10.5px;font-weight:600;color:var(--ink-4);text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;position:sticky;top:0;background:var(--surface);}
th:hover{color:var(--ink-2);}
td{padding:10px 12px;font-size:12.5px;color:var(--ink-2);border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface-2);cursor:pointer;}
.td-r{text-align:right;}

/* ── DETAIL SLIDE-OVER ───────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(20,28,24,.28);display:none;align-items:stretch;justify-content:flex-end;z-index:100;}
.overlay.open{display:flex;}
.slide-panel{width:420px;background:var(--surface);height:100%;overflow-y:auto;padding:26px 24px 40px;box-shadow:-6px 0 24px rgba(0,0,0,.1);}
.slide-panel::-webkit-scrollbar{width:3px;}
.slide-close{background:none;border:none;font:inherit;font-size:12px;color:var(--ink-3);cursor:pointer;display:flex;align-items:center;gap:5px;margin-bottom:18px;padding:0;}
.slide-close:hover{color:var(--ink-1);}
.slide-name{font-family:'Playfair Display',serif;font-size:21px;font-weight:400;color:var(--ink-1);}
.slide-clave{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-3);margin-top:2px;}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0 0;}
.field{display:flex;flex-direction:column;gap:3px;}
.field label{font-size:10.5px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.4px;}
.field .fv{font-size:13px;font-family:'IBM Plex Mono',monospace;color:var(--ink-1);}
.full{grid-column:1/-1;}
.section-lbl{font-size:10.5px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px;margin:20px 0 8px;}
select.estatus-sel{font:inherit;font-size:13px;padding:7px 9px;border-radius:7px;border:1px solid var(--border);background:var(--surface-2);width:100%;color:var(--ink-1);outline:none;}
textarea.notes-ta{width:100%;font:inherit;font-size:12.5px;padding:8px 10px;border:1px solid var(--border);border-radius:7px;resize:vertical;min-height:60px;background:var(--surface-2);color:var(--ink-1);outline:none;}
textarea.notes-ta:focus{border-color:var(--border-2);}
.log-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px;}
.log-item .when{font-family:'IBM Plex Mono',monospace;color:var(--ink-3);flex-shrink:0;width:88px;}
.log-item .log-canal{font-weight:600;color:var(--ink-2);}
.btn-row{display:flex;gap:8px;margin-top:18px;}
.btn{font:inherit;font-size:12.5px;font-weight:500;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--ink-2);cursor:pointer;transition:all .15s;}
.btn:hover{border-color:var(--border-2);color:var(--ink-1);}
.btn-primary{background:var(--ink-1);border-color:var(--ink-1);color:#fff;}
.btn-primary:hover{background:#2d2b27;}
.btn-green{background:var(--sage-bg);border-color:var(--sage);color:#3d7a5a;}

/* conciliacion badge en panel */
.conc-alert{background:var(--sage-bg);border:1px solid var(--sage);border-radius:8px;padding:10px 14px;margin:14px 0;font-size:12px;color:#2d5e42;display:flex;align-items:flex-start;gap:8px;}
.conc-alert svg{flex-shrink:0;margin-top:1px;}

/* ── VIEW: AGENDA (Gantt + Calendario) ──────────────────── */
#view-agenda{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.agenda-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 28px;background:var(--surface);flex-shrink:0;}
.atab{font:inherit;font-size:12.5px;font-weight:500;padding:12px 16px;border:none;border-bottom:2px solid transparent;background:none;color:var(--ink-3);cursor:pointer;transition:color .15s,border-color .15s;margin-bottom:-1px;}
.atab:hover{color:var(--ink-2);}
.atab.active{color:var(--ink-1);border-bottom-color:var(--ink-1);}
.agenda-body{flex:1;overflow-y:auto;padding:24px 28px;}
.agenda-body::-webkit-scrollbar{width:3px;} .agenda-body::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:2px;}

/* Gantt */
.gantt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.gantt-header h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;color:var(--ink-1);}
.gantt-legend{display:flex;gap:14px;font-size:11px;color:var(--ink-3);}
.gantt-legend span{display:flex;align-items:center;gap:5px;}
.legend-dot{width:8px;height:8px;border-radius:2px;display:inline-block;}
.gantt-empty{text-align:center;padding:60px 20px;color:var(--ink-4);font-size:13px;}

.gantt-row{display:flex;align-items:center;gap:0;padding:0;margin-bottom:6px;border-radius:9px;overflow:hidden;background:var(--surface);border:1px solid var(--border);transition:box-shadow .15s;cursor:pointer;}
.gantt-row:hover{box-shadow:0 2px 8px rgba(0,0,0,.07);}
.gantt-info{width:220px;flex-shrink:0;padding:10px 14px;border-right:1px solid var(--border);}
.gantt-name{font-size:12.5px;font-weight:600;color:var(--ink-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gantt-sub{font-size:11px;color:var(--ink-3);margin-top:1px;}
.gantt-track{flex:1;padding:0 14px;position:relative;height:54px;display:flex;align-items:center;}
.gantt-bar-bg{width:100%;height:14px;background:var(--surface-2);border-radius:99px;overflow:hidden;position:relative;}
.gantt-bar-fill{height:100%;border-radius:99px;transition:width .4s;}
.gantt-countdown{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;}
.gantt-deadline{font-size:11px;color:var(--ink-4);margin-top:3px;}

/* countdown colors */
.cnt-ok    {color:#2F7D4F;} .bar-ok    {background:#7ec8a0;}
.cnt-warn  {color:#B6791C;} .bar-warn  {background:#f5c26b;}
.cnt-alert {color:#c0542a;} .bar-alert {background:#f5a06b;}
.cnt-due   {color:#B23B3B;} .bar-due   {background:#e88080;}
.cnt-late  {color:#7a2222;} .bar-late  {background:#c0c0c0;}

/* vence-hoy badge */
.badge-due{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:#fae7e5;color:#B23B3B;border:1px solid #e8c4c0;margin-left:7px;animation:pulse-badge 1.5s ease-in-out infinite;}
.badge-late{background:#f0e8e8;color:#7a2222;border-color:#d4b8b8;animation:none;}
@keyframes pulse-badge{0%,100%{opacity:1;}50%{opacity:.6;}}

/* Calendario */
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.cal-nav h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;color:var(--ink-1);flex:1;text-align:center;}
.cal-nav-btn{font:inherit;background:var(--surface);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-2);transition:background .15s;}
.cal-nav-btn:hover{background:var(--surface-2);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-dow{text-align:center;font-size:10.5px;font-weight:600;color:var(--ink-4);text-transform:uppercase;letter-spacing:.5px;padding:4px 0 8px;}
.cal-day{min-height:76px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:7px 8px;cursor:default;transition:box-shadow .15s;}
.cal-day.has-events{cursor:pointer;}
.cal-day.has-events:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);}
.cal-day.today{border-color:var(--ink-1);background:var(--surface-2);}
.cal-day.other-month{background:transparent;border-color:transparent;}
.cal-day-num{font-size:12px;font-weight:600;color:var(--ink-3);margin-bottom:4px;}
.cal-day.today .cal-day-num{color:var(--ink-1);}
.cal-day.other-month .cal-day-num{color:var(--ink-4);}
.cal-event{font-size:10.5px;font-weight:500;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-event.ev-ok   {background:var(--sage-bg);color:#2f7d4f;}
.cal-event.ev-warn {background:#fdf3e0;color:#b6791c;}
.cal-event.ev-alert{background:#fde8dc;color:#c0542a;}
.cal-event.ev-due  {background:#fae7e5;color:#B23B3B;}
.cal-event.ev-late {background:#f0e8e8;color:#7a2222;}
.cal-day-popup{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:14px 16px;min-width:220px;max-width:300px;z-index:200;font-size:12.5px;}

/* ══════════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════════ */
async function init() {
  // Conexión
  try {
    const { error } = await db.from('conciliaciones').select('id').limit(1);
    supabaseOk = !error;
  } catch { supabaseOk = false; }
  document.getElementById('connDot').className   = `conn-dot ${supabaseOk?'ok':'err'}`;
  document.getElementById('connLabel').textContent = supabaseOk ? 'Conectado' : 'Sin conexión';

  // Intentar cargar tabla cobranza
  if (supabaseOk) {
    const { data, error } = await db.from('cobranza').select('*, cobranza_contactos(*)').order('dias_atraso', { ascending: false });
    if (!error && data && data.length > 0) {
      alumnos = data.map(r => ({
        ...r,
        intentos: (r.cobranza_contactos || []).sort((a,b)=>a.fecha>b.fecha?1:-1),
      }));
    } else {
      alumnos = DEMO; // fallback demo
    }
    // Cruzar con conciliaciones
    await cruzarConciliaciones();
  } else {
    alumnos = DEMO;
  }

  render();
}

/* ── Cruce con conciliaciones ────────────────────────────── */
async function cruzarConciliaciones() {
  try {
    const { data } = await db.from('conciliaciones')
      .select('clave_alumno,monto_banco,concepto,fecha,periodo,folio')
      .eq('estatus','APROBADO')
      .not('clave_alumno','is',null);
    if (!data) return;
    pagosMapa = {};
    data.forEach(r => {
      if (!pagosMapa[r.clave_alumno]) pagosMapa[r.clave_alumno] = [];
      pagosMapa[r.clave_alumno].push(r);
    });
    // Marcar automáticamente como PAGADO si hay pago conciliado
    alumnos.forEach(a => {
      if (pagosMapa[a.clave_alumno]?.length && a.estatus !== 'PAGADO') {
        a._pago_conciliado = true;
      }
    });
  } catch {}
}

  render();
}

}

   ══════════════════════════════════════════════════════════ */
function diasHasta(fechaStr) {
  if (!fechaStr) return null;
  const hoyISO = TODAY();
  const msHoy  = new Date(hoyISO + 'T00:00:00').getTime();
  const msDest = new Date(fechaStr + 'T00:00:00').getTime();
  return Math.round((msDest - msHoy) / 86400000);
}

function cntClass(dias) {
  if (dias === null) return '';
  if (dias > 7)  return 'ok';
  if (dias > 3)  return 'warn';
  if (dias > 0)  return 'alert';
  if (dias === 0) return 'due';
  return 'late';
}

function cntLabel(dias) {
  if (dias === null) return '';
  if (dias > 0)  return `${dias}d restantes`;
  if (dias === 0) return 'VENCE HOY';
  return `${Math.abs(dias)}d VENCIDO`;
}

function renderAgenda() {
  if (agendaTab === 'gantt') renderGantt();
  else renderCalendario();
}

/* ── GANTT ───────────────────────────────────────────────── */
function renderGantt() {
  const root = document.getElementById('agenda-body');
  // Alumnos con compromiso y fecha establecida
  const con = alumnos
    .filter(a => a.compromiso && a.fecha_para_pago)
    .sort((a,b) => {
      const da = diasHasta(a.fecha_para_pago), db2 = diasHasta(b.fecha_para_pago);
      return (da??999) - (db2??999);
    });

  // Max días para escalar barras (al menos 30)
  const maxDias = Math.max(30, ...con.map(a => Math.max(0, diasHasta(a.fecha_para_pago)||0)));

  let html = `<div class="gantt-header">
    <h2>Compromisos de pago</h2>
    <div class="gantt-legend">
      <span><i class="legend-dot" style="background:#7ec8a0"></i> +7 días</span>
      <span><i class="legend-dot" style="background:#f5c26b"></i> 4–7 días</span>
      <span><i class="legend-dot" style="background:#f5a06b"></i> 1–3 días</span>
      <span><i class="legend-dot" style="background:#e88080"></i> Vence hoy</span>
      <span><i class="legend-dot" style="background:#c0c0c0"></i> Vencido</span>
    </div>
  </div>`;

  if (!con.length) {
    html += `<div class="gantt-empty">
      <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="var(--ink-4)" stroke-width="1.2" style="margin-bottom:12px"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <div style="font-size:14px;font-weight:500;color:var(--ink-3)">Sin compromisos de pago registrados</div>
      <div style="margin-top:6px">Abre el panel de un alumno, marca "Hay compromiso de pago" y establece la fecha.</div>
    </div>`;
    root.innerHTML = html;
    return;
  }

  con.forEach(a => {
    const dias   = diasHasta(a.fecha_para_pago);
    const cls    = cntClass(dias);
    const lbl    = cntLabel(dias);
    const pct    = dias > 0 ? Math.min(100, Math.round((dias / maxDias) * 100)) : 0;
    const badgeHTML = dias === 0
      ? `<span class="badge-due">⚡ VENCE HOY</span>`
      : dias < 0
      ? `<span class="badge-due badge-late">⚠ ${Math.abs(dias)}d VENCIDO</span>`
      : '';

    html += `<div class="gantt-row" onclick="openDetail('${a.id}')">
      <div class="gantt-info">
        <div class="gantt-name">${a.nombre}${badgeHTML}</div>
        <div class="gantt-sub">${a.clave_alumno} · ${a.nivel} ${a.grado_grupo||''}</div>
        <div class="gantt-sub" style="margin-top:2px;font-family:'IBM Plex Mono',monospace">${MXN(a.total_adeudado)}</div>
      </div>
      <div class="gantt-track">
        <div style="flex:1">
          <div class="gantt-bar-bg">
            <div class="gantt-bar-fill bar-${cls}" style="width:${pct}%"></div>
          </div>
          <div class="gantt-deadline" style="margin-top:4px">Vence: <strong>${FMTD(a.fecha_para_pago)}</strong></div>
        </div>
        <div class="gantt-countdown cnt-${cls}" style="margin-left:14px;white-space:nowrap;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700">${lbl}</div>
      </div>
    </div>`;
  });

  root.innerHTML = html;
}

/* ── CALENDARIO ──────────────────────────────────────────── */
function renderCalendario() {
  const root = document.getElementById('agenda-body');
  const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DOW   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

  // Construir mapa fecha → alumnos
  const mapa = {};
  alumnos.filter(a => a.compromiso && a.fecha_para_pago).forEach(a => {
    if (!mapa[a.fecha_para_pago]) mapa[a.fecha_para_pago] = [];
    mapa[a.fecha_para_pago].push(a);
  });

  const hoyISO = TODAY();
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay  = new Date(calYear, calMonth + 1, 0);
  const startDow = firstDay.getDay();

  let html = `
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
      <h2>${MESES[calMonth]} ${calYear}</h2>
      <button class="cal-nav-btn" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">
      ${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}`;

  // Celdas vacías inicio
  for (let i = 0; i < startDow; i++) html += `<div class="cal-day other-month"></div>`;

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const iso = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const eventos = mapa[iso] || [];
    const isHoy   = iso === hoyISO;
    const hasCls  = eventos.length ? ' has-events' : '';
    const hoyCls  = isHoy ? ' today' : '';
    const dataAttr = eventos.length ? `data-fecha="${iso}"` : '';

    html += `<div class="cal-day${hasCls}${hoyCls}" ${dataAttr} onclick="${eventos.length?`openCalPopup('${iso}',event)`:''}" >
      <div class="cal-day-num">${d}${isHoy?'<span style="font-size:9px;color:var(--ink-4);margin-left:4px">hoy</span>':''}</div>
      ${eventos.slice(0,3).map(a => {
        const dias = diasHasta(iso);
        const ecls = `ev-${cntClass(dias)}`;
        return `<div class="cal-event ${ecls}">${a.nombre.split(' ')[0]} ${a.nombre.split(' ').slice(-1)[0]}</div>`;
      }).join('')}
      ${eventos.length > 3 ? `<div style="font-size:10px;color:var(--ink-4)">+${eventos.length-3} más</div>` : ''}
    </div>`;
  }

  // Celdas vacías fin
  const remaining = 7 - ((startDow + lastDay.getDate()) % 7);
  if (remaining < 7) for (let i = 0; i < remaining; i++) html += `<div class="cal-day other-month"></div>`;

  html += '</div>';
  root.innerHTML = html;
}

function calNav(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendario();
}

function openCalPopup(iso, e) {
  document.querySelector('.cal-day-popup')?.remove();
  const mapa = {};
  alumnos.filter(a => a.compromiso && a.fecha_para_pago).forEach(a => {
    if (!mapa[a.fecha_para_pago]) mapa[a.fecha_para_pago] = [];
    mapa[a.fecha_para_pago].push(a);
  });
  const lista = mapa[iso] || [];
  const dias = diasHasta(iso);
  const popup = document.createElement('div');
  popup.className = 'cal-day-popup';
  popup.innerHTML = `<h4>Compromisos ${FMTD(iso)}</h4>
    ${lista.map(a => `<div class="cal-popup-item" onclick="document.querySelector('.cal-day-popup')?.remove();openDetail('${a.id}')">
      <span class="cal-popup-name">${a.nombre}</span>
      <span class="cal-popup-days cnt-${cntClass(dias)}">${cntLabel(dias)}</span>
    </div>`).join('')}`;
  document.body.appendChild(popup);
  const rect = e.target.closest('.cal-day').getBoundingClientRect();
  popup.style.top  = Math.min(rect.bottom + 6, window.innerHeight - 200) + 'px';
  popup.style.left = Math.min(rect.left, window.innerWidth - 320) + 'px';
  setTimeout(() => document.addEventListener('click', () => popup.remove(), { once: true }), 100);
}

   KANBAN
   ══════════════════════════════════════════════════════════ */
function renderKanban() {
  const root = document.getElementById('view-kanban');
  root.innerHTML = '<div class="board" id="board"></div>';
  const board = document.getElementById('board');
  const data  = getFiltered();

  ESTADOS.forEach(estado => {
    const items = data.filter(a => a.estatus === estado).sort((a,b) => b.dias_atraso - a.dias_atraso);
    const col = document.createElement('div');
    col.className = 'col';
    col.dataset.estado = estado;
    col.innerHTML = `<div class="col-head">
      <div class="col-title"><div class="col-dot" style="background:${COL_DOT_COLOR[estado]}"></div>${ESTADO_LABEL[estado]}</div>
      <div class="col-count">${items.length}</div>
    </div>`;

    items.forEach(a => {
      const card = document.createElement('div');
      card.className = `card ${estado}`;
      card.draggable = true;
      card.dataset.id = a.id;
      const tieneConc = pagosMapa[a.clave_alumno]?.length;
      card.innerHTML = `
        <div class="card-top">
          <div style="flex:1;min-width:0">
            <div class="card-name">${a.nombre}</div>
            <div class="card-meta">${a.clave_alumno} · ${a.nivel} ${a.grado_grupo||''}</div>
          </div>
          <div class="card-days ${diaClass(a.dias_atraso)}">${a.dias_atraso}d</div>
        </div>
        <div class="card-foot">
          <span class="card-amount">${MXN(a.total_adeudado)}</span>
          ${tieneConc ? '<span class="card-pago-badge">✓ Pago en conc.</span>' : `<span>${a.ultima_fecha_contacto ? 'Últ. '+FMTD(a.ultima_fecha_contacto) : 'Sin contacto'}</span>`}
        </div>`;

      card.addEventListener('click', () => openDetail(a.id));
      card.addEventListener('dragstart', e => {
        e.dataTransfer.setData('text/plain', a.id);
        setTimeout(() => card.style.opacity = '.4', 0);
      });
      card.addEventListener('dragend', () => card.style.opacity = '1');
      col.appendChild(card);
    });

    col.addEventListener('dragover',  e => { e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', ()=> col.classList.remove('drag-over'));
    col.addEventListener('drop', async e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      const rawId = e.dataTransfer.getData('text/plain');
      const a = alumnos.find(x => String(x.id) === rawId);
      if (a && a.estatus !== estado) {
        await cambiarEstatus(a, estado);
      }
    });

    board.appendChild(col);
  });
}

function renderDashboard() {
  const root = document.getElementById('view-dashboard');
  const data = getFiltered();
  const activos = data.filter(a => a.estatus !== 'PAGADO');
  const totalAdeudado = activos.reduce((s,a) => s + (a.total_adeudado||0), 0);
  const promedioAtraso = activos.length ? Math.round(activos.reduce((s,a) => s+a.dias_atraso,0)/activos.length) : 0;

  const conConc = Object.keys(pagosMapa).filter(k => alumnos.find(a=>a.clave_alumno===k && a.estatus!=='PAGADO')).length;

  const max = Math.max(...ESTADOS.map(e=>data.filter(a=>a.estatus===e).length),1);

      <div class="kpi"><div class="kpi-accent" style="background:var(--sky)"></div><div class="kpi-label">Sin contactar</div><div class="kpi-val" style="color:var(--st-sin)">${sinContactar}</div><div class="kpi-sub">pendientes de iniciar</div></div>
      <div class="kpi"><div class="kpi-accent" style="background:var(--sage)"></div><div class="kpi-label">Pago en conciliación</div><div class="kpi-val" style="color:#3d7a5a">${conConc}</div><div class="kpi-sub">detectados automáticamente</div></div>
    </div>
    <div class="dash-grid">
      <div class="panel-box">
        <h3>Distribución por estatus</h3>
        ${ESTADOS.map(e=>{const n=data.filter(a=>a.estatus===e).length; return `
          <div class="bar-row">
            <div class="bar-lbl"><div class="col-dot" style="background:${COL_DOT_COLOR[e]};width:7px;height:7px;border-radius:50%;flex-shrink:0"></div>${ESTADO_LABEL[e]}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(n/max)*100}%;background:${COL_DOT_COLOR[e]}"></div></div>
            <div class="bar-n">${n}</div>
          </div>`}).join('')}

      <div class="panel-box">
        <h3>Mayor atraso</h3>
        <ul class="ranking">
          ${top6.map(a=>`<li><span class="rname">${a.nombre}</span><span class="rdays">${a.dias_atraso}d</span></li>`).join('')}
        </ul>
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════════════════
   TABLA
   ══════════════════════════════════════════════════════════ */
function renderTabla() {
  const root = document.getElementById('view-tabla');
  root.innerHTML = '';

  // Filtros
  const fr = document.createElement('div');
  fr.className = 'filter-row';
  [['ALL','Todos'], ...ESTADOS.map(e=>[e,ESTADO_LABEL[e]])].forEach(([v,l])=>{
    const b = document.createElement('button');
    b.className = 'fbtn' + (activeFilter===v?' active':'');
    b.textContent = l;
    b.onclick = () => { activeFilter = v; renderTabla(); };
    fr.appendChild(b);
  });
  root.appendChild(fr);

  let data = getFiltered();
  if (activeFilter !== 'ALL') data = data.filter(a => a.estatus === activeFilter);
  data = data.slice().sort((a,b) => sortDir * ((a[sortKey]>b[sortKey])?1:(a[sortKey]<b[sortKey]?-1:0)));

  const cols = [
    ['nombre','Alumno'],['clave_alumno','Clave'],['nivel','Nivel'],
    ['grado_grupo','Grado'],['total_adeudado','Adeudo'],
    ['dias_atraso','Atraso'],['estatus','Estatus'],['ultima_fecha_contacto','Últ. contacto']
  ];

  const outer = document.createElement('div');
  outer.className = 'tbl-outer';
  outer.innerHTML = `<table>
    <thead><tr>${cols.map(([k,l])=>`<th data-key="${k}">${l}${sortKey===k?(sortDir===1?' ↑':' ↓'):''}</th>`).join('')}</tr></thead>
    <tbody>${data.length ? data.map(a=>`<tr data-id="${a.id}">
      <td>${a.nombre}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-3)">${a.clave_alumno}</td>
      <td>${a.nivel}</td>
      <td>${a.grado_grupo||'—'}</td>
      <td class="td-r" style="font-family:'IBM Plex Mono',monospace">${MXN(a.total_adeudado)}</td>
      <td class="td-r" style="font-family:'IBM Plex Mono',monospace">${a.dias_atraso}d</td>
      <td><span class="chip ${a.estatus}"><span class="chip-dot ${a.estatus}"></span>${ESTADO_LABEL[a.estatus]}</span></td>
      <td>${FMTD(a.ultima_fecha_contacto)}</td>
    </tr>`).join('') : '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--ink-4)">Sin resultados</td></tr>'}</tbody>
  </table>`;
  root.appendChild(outer);

  outer.querySelectorAll('thead th').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.dataset.key;
      if (sortKey===k) sortDir*=-1; else { sortKey=k; sortDir=1; }
      renderTabla();
    });
  });
  outer.querySelectorAll('tbody tr[data-id]').forEach(tr => {
    tr.addEventListener('click', () => openDetail(tr.dataset.id));
  });
}

          <input id="inp-monto" type="number" step="0.01" min="0" placeholder="0.00"
            value="${a.monto_pagado||''}"
            style="width:100%;height:34px;padding:0 10px;border-radius:7px;border:1px solid var(--border);font:inherit;font-size:13px;font-family:'IBM Plex Mono',monospace;background:var(--surface);color:var(--ink-1);outline:none">
        </div>
        <div>
          <div style="font-size:10.5px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Fecha del pago</div>
          <input id="inp-fecha-pago" type="date"
            value="${a.fecha_pago_manual||TODAY()}"
            style="width:100%;height:34px;padding:0 10px;border-radius:7px;border:1px solid var(--border);font:inherit;font-size:12.5px;background:var(--surface);color:var(--ink-1);outline:none">
        </div>
      </div>
      <button class="btn btn-green" style="width:100%;justify-content:center" onclick="confirmarPagoManual('${a.id}')">
        Confirmar pago y marcar como Pagado
      </button>
    </div>

    <div class="section-lbl">Comentarios</div>
    <textarea class="notes-ta" id="inp-notas">${a.comentarios||''}</textarea>

    <div class="section-lbl">Registrar contacto</div>
    <div style="display:flex;gap:8px;margin-bottom:6px">
      <select class="estatus-sel" id="sel-canal" style="flex:1">${CANAL_OPS.map(c=>`<option>${c}</option>`).join('')}</select>
      <input id="inp-nota-contacto" type="text" placeholder="Nota del contacto" style="flex:2;height:36px;padding:0 10px;border-radius:7px;border:1px solid var(--border);font:inherit;font-size:12.5px;background:var(--surface-2);outline:none;color:var(--ink-1)">
    </div>

    <div class="section-lbl">Historial (${(a.intentos||[]).length})</div>
    <div>
      ${(a.intentos||[]).length ? [...(a.intentos||[])].reverse().map(i=>`
        <div class="log-item">
          <div class="when">${FMTD(i.fecha)}</div>
          <div><span class="log-canal">${i.canal}</span> — ${i.nota}</div>
        </div>`).join('') : '<div style="font-size:12px;color:var(--ink-4);padding:8px 0">Sin intentos registrados.</div>'}
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="guardarContacto('${a.id}')">Registrar contacto</button>
      <button class="btn" onclick="guardarCambios('${a.id}')">Guardar cambios</button>
    </div>`;

  overlay.classList.add('open');
  overlay.onclick = e => { if (e.target===overlay) overlay.classList.remove('open'); };
}

/* ── Acciones ────────────────────────────────────────────── */
async function cambiarEstatus(a, nuevoEstatus) {
  a.estatus = nuevoEstatus;
  if (nuevoEstatus === 'SUSPENDIDO') { a.suspension = true; a.fecha_suspension = TODAY(); }
  if (supabaseOk && !String(a.id).startsWith('d')) {
    await db.from('cobranza').update({ estatus: nuevoEstatus, updated_at: new Date().toISOString() }).eq('id', a.id);
  }
  render();
}

async function guardarCambios(id) {
  const a = alumnos.find(x => String(x.id) === id);
  if (!a) return;
  const estatus       = document.getElementById('sel-estatus').value;
  const comentarios   = document.getElementById('inp-notas').value;
  const compromiso    = document.getElementById('chk-compromiso').checked;
  const fecha_para_pago = document.getElementById('inp-fecha-compromiso').value || null;
  a.estatus = estatus;
  a.comentarios = comentarios;
  a.compromiso = compromiso;
  a.fecha_para_pago = fecha_para_pago;
  if (supabaseOk && !id.startsWith('d')) {
    await db.from('cobranza').update({
      estatus, comentarios, compromiso, fecha_para_pago,
      updated_at: new Date().toISOString()
    }).eq('id', id);
  }
  document.getElementById('overlay').classList.remove('open');
  render();
}

async function guardarContacto(id) {
  const a = alumnos.find(x => String(x.id) === id);
  if (!a) return;
  const canal = document.getElementById('sel-canal').value;
  const nota  = document.getElementById('inp-nota-contacto').value.trim();
  if (!nota) return;
  const nuevo = { fecha: TODAY(), canal, nota };
  if (!a.intentos) a.intentos = [];
  a.intentos.push(nuevo);
  a.ultima_fecha_contacto = TODAY();
  if (supabaseOk && !id.startsWith('d')) {
    await db.from('cobranza_contactos').insert({ cobranza_id: id, ...nuevo, created_at: new Date().toISOString() });
    await db.from('cobranza').update({ ultima_fecha_contacto: TODAY(), updated_at: new Date().toISOString() }).eq('id', id);
  }
  openDetail(id);
}

async function marcarPagado(id) {
  const a = alumnos.find(x => String(x.id) === id);
  if (!a) return;
  await cambiarEstatus(a, 'PAGADO');
  document.getElementById('overlay').classList.remove('open');
}

async function confirmarPagoManual(id) {
  const a = alumnos.find(x => String(x.id) === id);
  if (!a) return;
  const monto = parseFloat(document.getElementById('inp-monto').value) || 0;
  const fechaPago = document.getElementById('inp-fecha-pago').value || TODAY();
  if (monto <= 0) { alert('Ingresa un monto válido para confirmar el pago.'); return; }
  if (!confirm(`¿Confirmas el pago de ${MXN(monto)} para ${a.nombre} con fecha ${fechaPago}?\n\nSe marcará como PAGADO.`)) return;

  a.monto_pagado = monto;
  a.fecha_pago_manual = fechaPago;
  a.pago_confirmado = true;
  a.estatus = 'PAGADO';

  if (supabaseOk && !String(id).startsWith('d')) {
    await db.from('cobranza').update({
      estatus: 'PAGADO',
      monto_pagado: monto,
      pago_confirmado: true,
      ultima_fecha_contacto: fechaPago,
      updated_at: new Date().toISOString()
    }).eq('id', id);
  }
  document.getElementById('overlay').classList.remove('open');
  render();
}

/* ── Boot ────────────────────────────────────────────────── */
init();

function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebarBackdrop').classList.toggle('show');
}
function closeSidebar(){
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('show');
}
document.querySelectorAll('.nav-item').forEach(el=>{
  el.addEventListener('click',()=>{ if(window.innerWidth<=768) closeSidebar(); });
});
</script>
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>
</body>
</html>
